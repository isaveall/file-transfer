<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件传输</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ===== 标题栏 ===== -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag"></div>
    <div class="titlebar-buttons">
      <button class="tb-btn tb-min" id="btnMin" title="最小化">
        <svg viewBox="0 0 11 11" width="11" height="11"><path d="M0 5.5h11" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="tb-btn tb-max" id="btnMax" title="最大化">
        <svg viewBox="0 0 11 11" width="11" height="11"><rect x="0.5" y="0.5" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button class="tb-btn tb-close" id="btnClose" title="关闭">
        <svg viewBox="0 0 11 11" width="11" height="11"><path d="M0 0L11 11M11 0L0 11" stroke="currentColor" stroke-width="1"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== 主体 ===== -->
  <div class="container">
    <!-- 顶部：目标选择 -->
    <div class="header">
      <span class="header-label">发送到：</span>
      <div class="device-select-wrap">
        <select id="targetSelect" class="device-select">
          <option value="">扫描中...</option>
        </select>
        <button id="btnDestManager" class="icon-btn" title="管理传输目标">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <button id="btnScanLan" class="icon-btn" title="扫描局域网设备">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </button>
      </div>
      <div class="local-info">
        <span id="localInfo">本机: --</span>
        <span class="port-info">端口: <span id="localPort">--</span></span>
        <button id="btnChangePort" class="icon-btn-small" title="更改监听端口">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 协议标签 -->
    <div class="protocol-bar" id="protocolBar">
      <span class="protocol-tag tag-local" id="tagLocal" style="display:none;">🌐 局域网</span>
      <span class="protocol-tag tag-ftp" id="tagFtp" style="display:none;">📁 FTP</span>
      <span class="protocol-tag tag-sftp" id="tagSftp" style="display:none;">🔒 SFTP</span>
      <span class="protocol-tag tag-webdav" id="tagWebdav" style="display:none;">☁️ WebDAV</span>
    </div>

    <!-- 中间：文件列表 + 拖拽区 -->
    <div class="main-area">
      <div class="file-header">
        <div class="col-name">文件</div>
        <div class="col-size">大小</div>
        <div class="col-progress">进度</div>
        <div class="col-status">状态</div>
      </div>
      <div class="file-list" id="fileList">
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">
            <svg viewBox="0 0 64 64" width="80" height="80">
              <rect x="12" y="8" width="40" height="48" rx="4" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3" opacity="0.3"/>
              <path d="M32 20v24M22 34l10 10 10-10" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
            </svg>
          </div>
          <p class="drop-text">拖拽文件/文件夹到此处</p>
        </div>
      </div>
    </div>

    <!-- 底部按钮栏 -->
    <div class="footer">
      <div class="footer-left">
        <button id="btnAddFile" class="action-btn" title="添加文件">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="btnAddFolder" class="action-btn" title="添加文件夹">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
            <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" opacity="0.4"/>
          </svg>
        </button>
        <button id="btnRemove" class="action-btn" title="移除选中">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
        </button>
        <button id="btnClearAll" class="action-btn" title="清空列表">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6M10 11v6M14 11v6"/></svg>
        </button>
        <div class="context-menu-toggle" id="contextMenuToggle">
          <label class="switch" id="contextSwitch">
            <input type="checkbox" id="contextMenuCheckbox">
            <span class="slider"></span>
          </label>
          <span class="toggle-label" id="contextMenuLabel">右键传输</span>
        </div>
      </div>
      <div class="footer-right">
        <button id="btnCancel" class="ctrl-btn" disabled>取消</button>
        <button id="btnSend" class="ctrl-btn btn-primary" disabled>发送</button>
      </div>
    </div>

    <!-- 接收状态栏 -->
    <div class="receive-bar" id="receiveBar" style="display:none;">
      <span class="receive-label">📥 接收中</span>
      <span class="receive-file" id="receiveFile">--</span>
      <div class="progress-bar"><div class="progress-fill" id="receiveProgressFill"></div></div>
      <span class="receive-percent" id="receivePercent">0%</span>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
